name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Restore
        run: dotnet restore Smoower.Minified.slnx
      - name: Build
        run: dotnet build Smoower.Minified.slnx -c Release --no-restore
      - name: Test
        run: dotnet test Smoower.Minified.slnx -c Release --no-build --verbosity normal
